{% load static %}
{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet"
          href="{% static 'css/auth.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="circle-icon">
            <img src="{% static 'img/Logo.jpg'%}" alt="">
        </div>

        <h1>Create Account</h1>

        <p>
            Join MyShoes and step into premium fashion.
        </p>

        <form method="POST"
              action="{% url 'account_signup' %}">

            {% csrf_token %}

            <div class="input-box">

                <i class="fas fa-user"></i>

                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>

            </div>

            <div class="input-box">

                <i class="fas fa-envelope"></i>

                <input type="email"
                       name="email"
                       placeholder="Email"
                       required>

            </div>

            <div class="input-box">

                <i class="fas fa-lock"></i>

                <input type="password"
                       name="password1"
                       placeholder="Password"
                       required>

            </div>

            <div class="input-box">

                <i class="fas fa-lock"></i>

                <input type="password"
                       name="password2"
                       placeholder="Confirm Password"
                       required>

            </div>

            <button type="submit"
                    class="gold-btn">

                Create Account

            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="{% provider_login_url 'google' %}"
           class="google-btn">

            <i class="fab fa-google"></i>
            Continue with Google

        </a>

        <div class="auth-footer">

            Already have an account?

            <a href="{% url 'account_login' %}">
                Login
            </a>

        </div>

    </div>

</div>

</body>
</html>
