{% load static %}
{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login </title>

    <link rel="stylesheet"
          href="{% static 'css/auth.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="circle-icon">
            <img src="{% static 'img/Logo.jpg'%}" alt="">
        </div>

        <h1>Welcome Back</h1>

        <p>
            Login and continue your fashion journey.
        </p>
{% if messages %}
<div id="messages-container">

    {% for message in messages %}
    <div class="message {{ message.tags }}">

        <span>{{ message }}</span>

        <button
            type="button"
            class="close-message">
            &times;
        </button>

    </div>
    {% endfor %}

</div>
{% endif %}

        <form method="POST"
              action="{% url 'login' %}">

            {% csrf_token %}

            <div class="input-box">

                <i class="fas fa-user"></i>

                <input type="text"
                       name="login"
                       placeholder="Username or Email"
                       required>

            </div>

            <div class="input-box">

                <i class="fas fa-lock"></i>

                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>

            </div>

            <button type="submit"
                    class="gold-btn">

                Login

            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="{% provider_login_url 'google' %}"
           class="google-btn">

            <i class="fab fa-google"></i>
            Continue with Google

        </a>

        <div class="auth-footer">

            Don’t have an account?

            <a href="{% url 'account_signup' %}">
                Create Account
            </a>

        </div>

    </div>

</div>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
