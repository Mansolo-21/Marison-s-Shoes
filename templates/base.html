{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>{% block title %}Marison's Wears Shop{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/shop.css' %}">
    <link rel="stylesheet" href="{% static 'css/cart.css' %}">
    <link rel="stylesheet" href="{% static 'css/orders.css' %}">
   
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        /* NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 50px;

    background:white;

    border-bottom:1px solid #eee;

    position:sticky;
    top:0;
    z-index:999;

    box-shadow:
    0 4px 20px rgba(0,0,0,.03);
}

/* LEFT */

.nav-left{
    display:flex;
    align-items:center;
    gap:40px;
}

/* LOGO */

.logo{
    font-size:28px;
    font-weight:900;

    text-decoration:none;

    color:black;
}

.logo span{
    color:#d4af37;
}

/* LINKS */

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;

    color:#333;

    font-weight:600;

    transition:.3s;
}

.nav-links a:hover{
    color:#d4af37;
}

/* RIGHT */

.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
}

/* BUTTONS */

.login-btn,
.logout-btn{
    background:#111;
    color:white;

    text-decoration:none;

    padding:12px 22px;

    border-radius:14px;

    font-weight:800;
    letter-spacing:.5px;

    transition:.3s ease;

    display:inline-flex;
    align-items:center;
    gap:10px;

    box-shadow:
    0 8px 20px rgba(0,0,0,.12);
}

.login-btn:hover,
.logout-btn:hover{
    transform:translateY(-3px);

    background:#d4af37;
    color:black;

    box-shadow:
    0 12px 25px rgba(212,175,55,.35);
}

.signup-btn,
.dashboard-btn{
    background:#d4af37;

    color:black;

    text-decoration:none;

    padding:12px 20px;

    border-radius:14px;

    font-weight:800;

    transition:.3s;
}

.signup-btn:hover,
.dashboard-btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 10px 20px rgba(212,175,55,.25);
}

/* MOBILE */

@media(max-width:768px){

    .navbar{
        padding:20px;
        flex-direction:column;
        gap:20px;
    }

    .nav-left{
        flex-direction:column;
        gap:15px;
    }

    .nav-links{
        gap:15px;
    }

}
 .container {
            padding: 20px;
        }
    </style>
</head>

<body>

<nav class="navbar">

    <div class="nav-left">

        <a href="/" class="logo">
            Marison's<span>Wears</span>
        </a>

        <div class="nav-links">
            <a href="{% url 'owner_dashboard' %}">Dashboard</a>
            <a href="{% url 'shop'%}">Shop</a>
            <a href="{% url 'cart'%}">Cart</a>
            <a href="{% url 'orders' %}">Orders</a>
        </div>

    </div>

    <div class="nav-right">
        {% if user.is_authenticated %}
            <a href="{% url 'account_logout' %}" class="logout-btn">
                Logout
            </a>
        {% else %}
            
    <a href="{% url 'login' %}">Login</a>

    <a href="{% url 'signup' %}">Signup</a> 

        {% endif %}

    </div>

</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
